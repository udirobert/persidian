# Persidian — VPS deployment (nuncio-vultr)
# Traefik routes persidian.com + www.persidian.com to this container via
# the shared "coolify" Docker network — same pattern as the lenitnes and
# sikizana services already running on this box.

services:
  persidian-web:
    build: .
    container_name: persidian-web
    restart: unless-stopped
    # No host port is published. Traefik routes directly to this container
    # over the coolify Docker network, so there is no risk of colliding with
    # other projects that also happen to use port 3000 internally.
    networks:
      - coolify
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.persidian-web.rule=Host(`persidian.com`) || Host(`www.persidian.com`)
      - traefik.http.routers.persidian-web.entrypoints=https
      - traefik.http.routers.persidian-web.tls.certresolver=letsencrypt
      - traefik.http.services.persidian-web.loadbalancer.server.port=3000

networks:
  coolify:
    external: true
